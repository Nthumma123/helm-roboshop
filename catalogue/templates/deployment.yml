apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  #these labels are replicaset labels 
  labels:
    project: roboshop
    tier: backend
    component: catalogue
    environment: dev
spec:
  replicas: {{ .Values.deployment.replicas}}
  selector:
  #using these labels replicaset will select the pods to which it will route the traffic. These are called selector labels. These are used by replicaset to select the pods to which it will route the traffic. These are used by replicaset to create pods.
    matchLabels:
      project: roboshop
      tier: backend
      component: catalogue
      environment: dev
# This is pod definition. This is called pod template. This is used by replicaset to create pods.
  #pod is subset of replicaset 
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: catalogue
        environment: dev
    spec:
      containers:
      - name: catalogue
        image: "{{ .Values.deployment.imageName }}:{{ .Values.deployment.imageVersion }}"
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
          requests:
            memory: "64Mi"
            cpu: "250m" 
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 15
        livenessProbe:
          httpGet:  
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
        envFrom:
        - configMapRef:
            name: catalogue


